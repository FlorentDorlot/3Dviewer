<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>3D Viewer - Fond Blanc</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // FOND BLANC

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lumière équilibrée pour fond blanc
        const light = new THREE.HeispherictLight(0xffffff, 0xbbbbff, 2);
        scene.add(light);

        const loader = new GLTFLoader();
        loader.load('model.glb', (gltf) => {
            const model = gltf.scene;
            
            model.traverse((node) => {
                if (node.isMesh) {
                    node.material.transparent = true;
                    node.material.opacity = 0.6; // Ajustez pour voir à travers
                    
                    // On repasse en mélange Normal pour le fond blanc
                    node.material.blending = THREE.NormalBlending;
                    
                    // On active le tri des faces
                    node.material.depthWrite = false; 
                    node.material.side = THREE.DoubleSide;
                }
            });

            scene.add(model);
            
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            camera.position.set(center.x, center.y, center.z + (Math.max(size.x, size.y) * 2));
            controls.target.copy(center);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
