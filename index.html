<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>3D dispersion relation viewer</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; }

        /* White background layer, sits BEHIND the canvas */
        #bg {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 0;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 1;
            /* The renderer is transparent — additive blending works on black,
               so we composite it over a dark layer, then invert via mix-blend-mode */
            background: transparent;
            mix-blend-mode: multiply; /* inverts additive effect on white bg */
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        // No scene.background — renderer stays transparent
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true,          // transparent canvas
        });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.LinearToneMapping;
        renderer.setClearColor(0x000000, 0); // fully transparent clear
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const loader = new GLTFLoader();
        loader.load('model.glb', (gltf) => {
            const model = gltf.scene;

            model.traverse((node) => {
                if (node.isMesh) {
                    node.material.transparent = true;
                    node.material.blending = THREE.AdditiveBlending;
                    node.material.depthWrite = false;
                    node.material.depthTest = true;
                    node.material.side = THREE.DoubleSide;
                    node.material.opacity = 0.7;
                }
            });

            scene.add(model);

            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);

            camera.position.set(center.x, center.y, center.z + maxDim * 1.5);
            controls.target.copy(center);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
