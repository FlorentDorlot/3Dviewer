<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>3D Additive Blending - Fix</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Scène et Rendu
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace; // Couleurs correctes
        renderer.toneMapping = THREE.LinearToneMapping;   // Pour l'intensité lumineuse
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. Éclairage
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // 3. Chargement du modèle
        const loader = new GLTFLoader();
        loader.load('model.glb', (gltf) => {
            const model = gltf.scene;
            
            model.traverse((node) => {
                if (node.isMesh) {
                    // CONFIGURATION POUR LE SOMMAGE DES COULEURS
                    node.material.transparent = true;
                    
                    // Mode Additif : additionne les couleurs (RGB) au lieu de les superposer
                    node.material.blending = THREE.AdditiveBlending; 
                    
                    // On désactive l'écriture de profondeur pour que les objets
                    // "derrière" ne soient pas masqués par ceux de "devant"
                    node.material.depthWrite = false; 
                    
                    // On garde la lecture de profondeur pour que l'objet soit 
                    // occulté par d'éventuels objets opaques si nécessaire
                    node.material.depthTest = true;

                    node.material.side = THREE.DoubleSide; 

                    // Optionnel : Ajuster l'opacité si le cumul est trop brillant
                    node.material.opacity = 0.7; 
                }
            });

            scene.add(model);
            
            // Centrage automatique de la caméra
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            
            camera.position.set(center.x, center.y, center.z + (maxDim * 1.5));
            controls.target.copy(center);
        });

        // 4. Animation
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Gestion du redimensionnement
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
