<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>3D - White Background Fix</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #controls {
            position: fixed; top: 16px; left: 16px;
            background: rgba(0,0,0,0.08);
            padding: 10px 16px; border-radius: 8px;
            font-family: sans-serif; font-size: 14px;
        }
        label { cursor: pointer; user-select: none; }
    </style>
</head>
<body>
    <div id="controls">
        <label>
            <input type="checkbox" id="additiveToggle"> Additive Blending
        </label>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // white background in renderer

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.LinearToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        let meshes = [];

        const loader = new GLTFLoader();
        loader.load('model.glb', (gltf) => {
            const model = gltf.scene;

            model.traverse((node) => {
                if (node.isMesh) {
                    meshes.push(node);
                    // Normal blending works on any background
                    node.material.transparent = true;
                    node.material.blending = THREE.NormalBlending;
                    node.material.depthWrite = true;
                    node.material.depthTest = true;
                    node.material.side = THREE.DoubleSide;
                    node.material.opacity = 0.85;
                }
            });

            scene.add(model);

            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);

            camera.position.set(center.x, center.y, center.z + maxDim * 1.5);
            controls.target.copy(center);
        });

        // Toggle between blending modes to compare
        document.getElementById('additiveToggle').addEventListener('change', (e) => {
            const isAdditive = e.target.checked;
            // Additive needs a dark background to be visible
            scene.background = new THREE.Color(isAdditive ? 0x111111 : 0xffffff);
            document.body.style.background = isAdditive ? '#111111' : '#ffffff';

            meshes.forEach(node => {
                node.material.blending = isAdditive ? THREE.AdditiveBlending : THREE.NormalBlending;
                node.material.depthWrite = !isAdditive;
                node.material.needsUpdate = true;
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
