<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>3D Path Tracing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; overflow: hidden; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #ui {
            position: fixed; top: 16px; left: 16px; z-index: 10;
            display: flex; flex-direction: column; gap: 8px;
        }
        #ui div, #ui label {
            background: rgba(255,255,255,0.88);
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            display: flex; align-items: center; gap: 8px;
        }
        #ui label { cursor: pointer; }
        #samples { font-size: 12px; color: #555; }
        #loading {
            position: fixed; inset: 0; background: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; color: #666; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading">Loading model…</div>
    <div id="ui">
        <div id="samples">Samples: 0</div>
        <label><input type="checkbox" id="pauseToggle"> Pause rendering</label>
        <label>
            Bounces:
            <input type="range" id="bounces" min="1" max="20" value="5" style="width:80px">
            <span id="bouncesVal">5</span>
        </label>
    </div>

    <script src="pt-bundle.js"></script>
    <script>
        const { THREE, GLTFLoader, OrbitControls, RoomEnvironment, WebGLPathTracer } = window.__PT__;

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();

        // Polyfill all Scene properties added in Three r163+ that the path tracer reads
        if (!scene.environmentRotation) scene.environmentRotation = new THREE.Euler();
        if (!scene.backgroundRotation)  scene.backgroundRotation  = new THREE.Euler();
        if (scene.backgroundIntensity  === undefined) scene.backgroundIntensity  = 1;
        if (scene.environmentIntensity === undefined) scene.environmentIntensity = 1;
        if (scene.backgroundBlurriness === undefined) scene.backgroundBlurriness = 0;

        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);

        const pathTracer = new WebGLPathTracer(renderer);
        pathTracer.bounces = 5;
        pathTracer.tiles.set(3, 3);
        pathTracer.fadeDuration = 400;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.addEventListener('change', () => pathTracer.reset());

        const pmrem = new THREE.PMREMGenerator(renderer);
        pmrem.compileEquirectangularShader();
        scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
        scene.background = new THREE.Color(0xffffff);

        const loader = new GLTFLoader();
        loader.load('model.glb', (gltf) => {
            const model = gltf.scene;
            model.traverse((node) => {
                if (node.isMesh) {
                    const old = node.material;
                    node.material = new THREE.MeshPhysicalMaterial({
                        color: old.color ?? new THREE.Color(0xcccccc),
                        map: old.map ?? null,
                        roughness: old.roughness ?? 0.4,
                        metalness: old.metalness ?? 0.1,
                        normalMap: old.normalMap ?? null,
                        envMapIntensity: 1.0,
                    });
                }
            });
            scene.add(model);

            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);

            camera.position.set(center.x, center.y + maxDim * 0.3, center.z + maxDim * 1.8);
            controls.target.copy(center);
            controls.update();

            pathTracer.setScene(scene, camera);
            document.getElementById('loading').style.display = 'none';
        },
        undefined,
        (err) => {
            document.getElementById('loading').textContent = 'Error loading model.glb';
            console.error(err);
        });

        const samplesEl    = document.getElementById('samples');
        const pauseToggle  = document.getElementById('pauseToggle');
        const bouncesSlider = document.getElementById('bounces');
        const bouncesValEl = document.getElementById('bouncesVal');

        bouncesSlider.addEventListener('input', () => {
            pathTracer.bounces = parseInt(bouncesSlider.value);
            bouncesValEl.textContent = bouncesSlider.value;
            pathTracer.reset();
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (!pauseToggle.checked) {
                pathTracer.renderSample();
                samplesEl.textContent = `Samples: ${pathTracer.samples}`;
            }
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            pathTracer.reset();
        });
    </script>
</body>
</html>
