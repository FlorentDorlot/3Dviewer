<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Fix - Alpha Sorting</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        // Important pour les couleurs émissives
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const light = new THREE.AmbientLight(0xffffff, 2); 
        scene.add(light);

        const loader = new GLTFLoader();
        loader.load('model.glb', (gltf) => {
            const model = gltf.scene;
            
            model.traverse((node) => {
                if (node.isMesh) {
                    // C'EST ICI QUE LA MAGIE OPÈRE :
                    node.material.transparent = true;
                    node.material.depthWrite = true; // Force l'écriture dans le tampon de profondeur
                    node.material.alphaTest = 0.05;  // Ignore les pixels presque invisibles
                    node.material.side = THREE.DoubleSide; // Affiche intérieur et extérieur
                    
                    // On ajuste le rendu pour éviter que les cônes se mangent entre eux
                    node.renderOrder = node.id; 
                }
            });

            scene.add(model);
            
            // Centrer la caméra
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            camera.position.set(center.x, center.y, center.z + 5);
            controls.target.copy(center);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
