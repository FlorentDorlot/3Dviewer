<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>3D dispersion relation viewer</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; font-family: sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; }
        .title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="title">3D dispersion relation viewer</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Correction de la lumière (HemisphericLight)
        const light = new THREE.HemisphericLight(0xffffff, 0x444444, 3);
        scene.add(light);

        const loader = new GLTFLoader();
        loader.load('model.glb', (gltf) => {
            const model = gltf.scene;
            
            model.traverse((node) => {
                if (node.isMesh) {
                    node.material.transparent = true;
                    node.material.opacity = 0.7; // Opacité augmentée pour le fond blanc
                    node.material.blending = THREE.NormalBlending;
                    node.material.depthWrite = false; 
                    node.material.side = THREE.DoubleSide;
                    
                    // Si le modèle a des couleurs émissives, on les booste pour le blanc
                    if (node.material.emissive) {
                        node.material.emissiveIntensity = 1.5;
                    }
                }
            });

            scene.add(model);
            
            // Ajustement de la vue
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            
            camera.position.set(center.x + maxDim, center.y + maxDim, center.z + maxDim);
            controls.target.copy(center);
            controls.update();
        }, undefined, (error) => {
            console.error("Erreur de chargement :", error);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
